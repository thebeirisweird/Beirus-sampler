BeirusSampler_Fixed: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    -BeirusSampler_Fixed: Checkout Code
      uses: actions/checkout@v4

    -BeirusSampler_Fixed: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    -BeirusSampler_Fixed: Grant execute permission for gradlew
      run: chmod +x gradlew

   -BeirusSampler_Fixed: Build with Gradle
      run: ./gradlew assembleDebug

    -BeirusSampler_Fixed:  Upload APK
      uses: actions/upload-artifact@v4
      with:
        BeirusSampler_Fixed: app-debug
         path: app/build/outputs/apk/debug/app-debug.apk
