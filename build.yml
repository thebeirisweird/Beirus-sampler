# ─────────────────────────────────────────────────────────────────────────────
# Beirus Sampler — GitHub Actions Cloud Build
#
# Triggers: every push to main, or manually via Actions tab.
# Output:   app-debug.apk  (download from the workflow run's Artifacts section)
# ─────────────────────────────────────────────────────────────────────────────
name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:   # ← lets you trigger manually from the GitHub UI

jobs:
  build:
    name: Assemble Debug APK
    runs-on: ubuntu-latest   # x86_64 Linux — no ARM mismatch

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Java 17 ─────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Android SDK + NDK ───────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 25.2.9519653
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;25.2.9519653" \
            "cmake;3.22.1" \
            "build-tools;34.0.0" \
            "platforms;android-34"

      # ── 4. Cache Gradle artifacts ──────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 5. Make gradlew executable ─────────────────────────────────────
      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      # ── 6. Build ───────────────────────────────────────────────────────
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      # ── 7. Upload APK as artifact ──────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BeirusSampler-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30   # artifact stays available for 30 days
